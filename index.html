<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>우리 가족 시상식</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#ffe5ec,#e0f7fa,#fff1e6,#e5ffe5);
}

.container{
  padding:16px;
  max-width:100%;
  box-sizing:border-box;
}

/* 상단 이미지 */
.title-img{
  width:100%;
  border-radius:18px;
  margin-bottom:14px;
}

/* 박스 영역 */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap:10px;
}

/* 박스 */
.box{
  background:white;
  padding:22px 10px;
  border-radius:20px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  box-shadow:0 6px 14px rgba(0,0,0,0.12);
}

/* 하트 */
.heart{
  position:absolute;
  font-size:20px;
  animation: spread 1s ease-out forwards;
}

@keyframes spread{
  0%{opacity:1; transform:scale(0.5);}
  100%{opacity:0; transform:translateY(-70px) scale(2);}
}

/* 팝업 */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:linear-gradient(45deg, red, orange, yellow, green, blue, purple);
  padding:30px;
  border-radius:20px;
  color:white;
  font-size:20px;
  display:none;
  z-index:999;
  text-align:center;
}

.popup button{
  margin-top:15px;
  padding:10px 18px;
  border:none;
  border-radius:12px;
  background:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

  <!-- ✅ 내가 이미지까지 넣어줌 (수정 필요 없음) -->
  <img src="https://images.unsplash.com/photo-1511988617509-a57c8a288659?q=80&w=1200" class="title-img">

  <div class="grid">
    <div class="box" onclick="clickBox(event,'건강')">건강</div>
    <div class="box" onclick="clickBox(event,'사랑')">사랑</div>
    <div class="box" onclick="clickBox(event,'격려')">격려</div>
    <div class="box" onclick="clickBox(event,'휴식')">휴식</div>
    <div class="box" onclick="clickBox(event,'행복')">행복</div>
    <div class="box" onclick="clickBox(event,'성장')">성장</div>
  </div>

</div>

<div class="popup" id="popup">
  <div id="popupText"></div>
  <button onclick="closePopup()">닫기</button>
</div>

<script>
function clickBox(e,text){

  for(let i=0;i<10;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left=(Math.random()*80+10)+"%";
    heart.style.top="60%";

    e.currentTarget.appendChild(heart);
    setTimeout(()=>heart.remove(),1000);
  }

  document.getElementById("popupText").innerText=text + " 선물 🎁";
  document.getElementById("popup").style.display="block";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
