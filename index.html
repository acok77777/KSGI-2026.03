<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>나에게 주는 선물</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  text-align:center;
  overflow-x:hidden;
  overflow-y:auto; /* ✅ 핵심 수정 */
}

/* 상단 */
.header{
  position:relative;
}

.title-img{
  width:90%;
  max-width:500px;
  margin:10px auto;
  display:block;
}

/* 전체화면 버튼 */
.full-btn{
  position:absolute;
  top:10px;
  right:10px;
  font-size:14px;
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:#333;
  color:white;
  cursor:pointer;
  z-index:10;
}

/* 기본 그리드 */
.grid{
  display:grid;
  grid-template-columns:repeat(4, 190px);
  justify-content:center;
  gap:10px;
  padding:10px;
}

/* 박스 */
.grid img{
  width:190px;
  height:200px;
  object-fit:cover;
  border-radius:15px;
  cursor:pointer;
}

/* 👉 가로모드일 때 자동 축소 */
@media (orientation: landscape){
  .grid{
    grid-template-columns:repeat(4, 1fr);
  }

  .grid img{
    width:100%;
    height:22vh; /* ✅ 화면 높이에 맞춤 */
  }

  .title-img{
    max-width:300px;
    margin:5px auto;
  }
}

/* 하트 */
.heart{
  position:absolute;
  font-size:30px;
  animation:heartSpread 1s ease-out forwards;
  pointer-events:none;
}

@keyframes heartSpread{
  0%{
    transform:scale(0.5);
    opacity:1;
  }
  100%{
    transform:scale(3);
    opacity:0;
  }
}

/* 팝업 */
.popup{
  position:fixed;
  top:0; left:0;
  width:100vw;
  height:100dvh;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 닫기 */
.close{
  position:absolute;
  top:20px;
  right:20px;
  font-size:40px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <img src="title.png" class="title-img">
  <button class="full-btn" id="fullBtn" onclick="goFull()">전체화면</button>
</div>

<div class="grid">
  <img src="01.png" onclick="openPop(event,'health.png')">
  <img src="02.png" onclick="openPop(event,'love.png')">
  <img src="03.png" onclick="openPop(event,'cheer.png')">
  <img src="04.png" onclick="openPop(event,'rest.png')">

  <img src="05.png" onclick="openPop(event,'freedom.png')">
  <img src="06.png" onclick="openPop(event,'thanks.png')">
  <img src="07.png" onclick="openPop(event,'courage.png')">
  <img src="08.png" onclick="openPop(event,'hope.png')">
</div>

<div class="popup" id="popup">
  <div class="close" onclick="closePop()">✖</div>
  <img id="popImg">
</div>

<script>

function openPop(e, img){

  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";

  const rect = e.target.getBoundingClientRect();
  heart.style.left = rect.left + rect.width/2 + "px";
  heart.style.top = rect.top + rect.height/2 + "px";

  document.body.appendChild(heart);

  setTimeout(()=>{
    heart.remove();
    document.getElementById("popup").style.display="flex";
    document.getElementById("popImg").src = img;
  },1000);
}

function closePop(){
  document.getElementById("popup").style.display="none";
}

async function goFull(){
  const el = document.documentElement;

  if(el.requestFullscreen){
    await el.requestFullscreen();
  }

  document.getElementById("fullBtn").style.display="none";

  if(screen.orientation && screen.orientation.lock){
    try{
      await screen.orientation.lock('landscape');
    }catch(e){}
  }
}

</script>

</body>
</html>
