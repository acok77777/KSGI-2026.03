<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>나에게 주는 선물</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  text-align:center;
  overflow-x:hidden;
}

/* 상단 */
.header{
  position:relative;
}

.title-img{
  width:90%;
  max-width:500px;
  margin:10px auto;
  display:block;
}

/* 전체화면 버튼 */
.full-btn{
  position:absolute;
  top:10px;
  right:10px;
  font-size:14px;
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:#333;
  color:white;
  cursor:pointer;
  z-index:10;
}

/* 그리드 */
.grid{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:10px;
  padding:10px;
}

.grid img{
  width:100%;
  aspect-ratio:190/200;
  object-fit:cover;
  border-radius:15px;
  cursor:pointer;
  transition:0.15s;
}

.grid img:active{
  transform:scale(0.95);
}

/* 💖 여러 하트 */
.heart{
  position:absolute;
  font-size:24px;
  pointer-events:none;
  animation:spread 0.6s ease-out forwards;
}

@keyframes spread{
  0%{
    transform:scale(0.5) translate(0,0);
    opacity:1;
  }
  100%{
    transform:scale(1.8) translate(var(--x), var(--y));
    opacity:0;
  }
}

/* 팝업 배경 */
.popup{
  position:fixed;
  top:0; left:0;
  width:100vw;
  height:100dvh;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

/* 팝업 카드 */
.popup-content{
  width:90%;
  max-width:800px;
  max-height:80dvh;
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.popup-content img{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* 닫기 */
.close{
  position:absolute;
  top:20px;
  right:25px;
  font-size:35px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <img src="title.png" class="title-img">
  <button class="full-btn" id="fullBtn" onclick="goFull()">전체화면</button>
</div>

<div class="grid">
  <img src="01.png" onclick="openPop(event,'health.png')">
  <img src="02.png" onclick="openPop(event,'love.png')">
  <img src="03.png" onclick="openPop(event,'cheer.png')">
  <img src="04.png" onclick="openPop(event,'rest.png')">

  <img src="05.png" onclick="openPop(event,'freedom.png')">
  <img src="06.png" onclick="openPop(event,'thanks.png')">
  <img src="07.png" onclick="openPop(event,'courage.png')">
  <img src="08.png" onclick="openPop(event,'hope.png')">
</div>

<!-- 팝업 -->
<div class="popup" id="popup">
  <div class="close" onclick="closePop()">✖</div>
  <div class="popup-content">
    <img id="popImg">
  </div>
</div>

<script>

// 💖 여러 하트 생성
function createHearts(x, y){
  for(let i=0;i<8;i++){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";

    const angle = Math.random()*2*Math.PI;
    const distance = 60 + Math.random()*40;

    const moveX = Math.cos(angle)*distance + "px";
    const moveY = Math.sin(angle)*distance + "px";

    heart.style.left = x + "px";
    heart.style.top = y + "px";
    heart.style.setProperty('--x', moveX);
    heart.style.setProperty('--y', moveY);

    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),600);
  }
}

// 클릭
function openPop(e, img){

  const rect = e.target.getBoundingClientRect();
  const x = rect.left + rect.width/2;
  const y = rect.top + rect.height/2;

  createHearts(x,y);

  setTimeout(()=>{
    document.getElementById("popup").style.display="flex";
    document.getElementById("popImg").src = img;
  },500); // ⭐ 0.5초
}

// 닫기
function closePop(){
  document.getElementById("popup").style.display="none";
}

// 전체화면
async function goFull(){
  const el = document.documentElement;

  if(el.requestFullscreen){
    await el.requestFullscreen();
  }

  document.getElementById("fullBtn").style.display="none";

  if(screen.orientation && screen.orientation.lock){
    try{
      await screen.orientation.lock('landscape');
    }catch(e){}
  }
}

</script>

</body>
</html>
