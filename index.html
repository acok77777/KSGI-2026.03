<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>나에게 주는 선물</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#fff;
  overflow:hidden;
}

/* 전체화면 버튼 */
.full-btn{
  position:fixed;
  right:15px;
  top:15px;
  padding:8px 12px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
  z-index:1000;
}

/* 🔥 전체 여백 추가 */
.wrapper{
  padding:20px 15px;   /* 👉 상하 + 좌우 여백 증가 */
  box-sizing:border-box;
  height:100vh;
}

/* 그리드 */
.grid{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(2, 1fr);
  height:100%;        /* 👉 wrapper 안에서 꽉 */
  gap:10px;           /* 👉 박스 사이 여유 */
}

/* 박스 */
.item{
  cursor:pointer;
  overflow:hidden;
  border-radius:22px;   /* 👉 살짝 더 부드럽게 */
}

/* 이미지 */
.item img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.2s;
}

.item:active img{
  transform:scale(0.95);
}

/* 팝업 */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#fff;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup img{
  width:95%;
  max-height:95%;
}

/* 닫기 */
.close{
  position:absolute;
  top:15px;
  right:20px;
  font-size:35px;
  cursor:pointer;
}

/* 💖 하트 */
.heart{
  position:absolute;
  width:120px;
  animation:pop 0.5s ease-out;
  pointer-events:none;
}

@keyframes pop{
  0%{transform:scale(0); opacity:1;}
  100%{transform:scale(2.5); opacity:0;}
}
</style>
</head>

<body>

<!-- 전체화면 버튼 -->
<button class="full-btn" id="fullBtn" onclick="goFull()">전체화면</button>

<div class="wrapper">
  <div class="grid">

    <div class="item" onclick="openPopup(event,'health.png')"><img src="01.png"></div>
    <div class="item" onclick="openPopup(event,'love.png')"><img src="02.png"></div>
    <div class="item" onclick="openPopup(event,'cheer.png')"><img src="03.png"></div>
    <div class="item" onclick="openPopup(event,'rest.png')"><img src="04.png"></div>

    <div class="item" onclick="openPopup(event,'freedom.png')"><img src="05.png"></div>
    <div class="item" onclick="openPopup(event,'thanks.png')"><img src="06.png"></div>
    <div class="item" onclick="openPopup(event,'courage.png')"><img src="07.png"></div>
    <div class="item" onclick="openPopup(event,'hope.png')"><img src="08.png"></div>

  </div>
</div>

<!-- 팝업 -->
<div class="popup" id="popup">
  <div class="close" onclick="closePopup()">✖</div>
  <img id="popupImg">
</div>

<script>
// 💖 하트 + 팝업
function openPopup(e, imgSrc){

  for(let i=0;i<3;i++){
    let heart = document.createElement("img");
    heart.src = "heart.png";
    heart.className = "heart";

    heart.style.left = (e.clientX - 60 + (Math.random()*40-20)) + "px";
    heart.style.top = (e.clientY - 60 + (Math.random()*40-20)) + "px";

    document.body.appendChild(heart);
    setTimeout(()=> heart.remove(),500);
  }

  setTimeout(()=>{
    document.getElementById("popupImg").src = imgSrc;
    document.getElementById("popup").style.display = "flex";
  },200);
}

// 닫기
function closePopup(){
  document.getElementById("popup").style.display = "none";
}

// 전체화면
function goFull(){
  let doc = document.documentElement;

  if(doc.requestFullscreen){
    doc.requestFullscreen();
  }

  document.getElementById("fullBtn").style.display = "none";

  if(screen.orientation && screen.orientation.lock){
    screen.orientation.lock('landscape').catch(()=>{});
  }
}
</script>

</body>
</html>
