<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>우리 가족 시상식</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#ffe5ec,#e0f7fa,#fff1e6,#e5ffe5);
}

/* 🔥 전체 영역 - 스크롤 허용 (잘림 방지 핵심) */
.container{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding:20px;
  box-sizing:border-box;
}

/* 🔥 그리드 */
.grid{
  display:grid;
  grid-template-columns: repeat(2, 190px);
  gap:15px;
}

/* 🔥 박스 */
.box{
  width:190px;
  height:160px; /* ✅ 핵심 수정 */
  border-radius:20px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:16px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* ❤️ 하트 애니메이션 */
.heart{
  position:absolute;
  font-size:20px;
  animation:heartPop 0.6s ease-out forwards;
}

@keyframes heartPop{
  0%{transform:scale(0); opacity:1;}
  100%{transform:translateY(-80px) scale(1.5); opacity:0;}
}

/* 🔥 팝업 */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80%;
  max-width:400px;
  background:white;
  border-radius:20px;
  padding:20px;
  display:none;
  z-index:1000;
  text-align:center;
}

/* 배경 */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
}
</style>
</head>

<body>

<div class="container">
  <div class="grid">

    <div class="box" onclick="openBox(this)">
      건강 선물
    </div>

    <div class="box" onclick="openBox(this)">
      사랑 선물
    </div>

    <div class="box" onclick="openBox(this)">
      격려 선물
    </div>

    <div class="box" onclick="openBox(this)">
      휴식 선물
    </div>

  </div>
</div>

<div class="overlay" id="overlay"></div>

<div class="popup" id="popup">
  <h2>🎁 선물 도착!</h2>
  <p>지금 이 순간, 나에게 주는 소중한 선물입니다 💖</p>
  <button onclick="closePopup()">닫기</button>
</div>

<script>
function openBox(el){

  // ❤️ 하트 생성
  for(let i=0;i<8;i++){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*150 + "px";
    heart.style.top = Math.random()*120 + "px";

    el.appendChild(heart);

    setTimeout(()=>heart.remove(),600);
  }

  // 🔥 바로 팝업 (0.3초 제거)
  document.getElementById("popup").style.display="block";
  document.getElementById("overlay").style.display="block";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
  document.getElementById("overlay").style.display="none";
}
</script>

</body>
</html>
