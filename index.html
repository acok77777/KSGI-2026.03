<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>나에게 주는 선물</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  text-align:center;
}

/* 상단 */
.header{
  position:relative;
}

.title-img{
  width:90%;
  max-width:500px;
  margin:20px auto;
  display:block;
}

/* 전체화면 버튼 */
.full-btn{
  position:absolute;
  top:10px;
  right:10px;
  font-size:14px;
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:#333;
  color:white;
  cursor:pointer;
}

/* 그리드 */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

.grid img{
  width:100%;
  border-radius:15px;
  cursor:pointer;
  transition:0.15s;
}

/* 클릭 애니메이션 */
.grid img:active{
  transform:scale(0.9);
}

/* 팝업 */
.popup{
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup img{
  width:90%;
  max-width:500px;
  border-radius:20px;
}

/* 닫기 버튼 */
.close{
  position:absolute;
  top:20px;
  right:20px;
  font-size:35px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 상단 -->
<div class="header">
  <img src="title.png" class="title-img">
  <button class="full-btn" onclick="goFull()">전체화면</button>
</div>

<!-- 8칸 -->
<div class="grid">
  <img src="01.png" onclick="openPop('health.png')">
  <img src="02.png" onclick="openPop('love.png')">
  <img src="03.png" onclick="openPop('cheer.png')">
  <img src="04.png" onclick="openPop('rest.png')">

  <img src="05.png" onclick="openPop('freedom.png')">
  <img src="06.png" onclick="openPop('thanks.png')">
  <img src="07.png" onclick="openPop('courage.png')">
  <img src="08.png" onclick="openPop('hope.png')">
</div>

<!-- 팝업 -->
<div class="popup" id="popup">
  <div class="close" onclick="closePop()">✖</div>
  <img id="popImg">
</div>

<script>
// 팝업 열기
function openPop(img){
  document.getElementById("popup").style.display="flex";
  document.getElementById("popImg").src = img;
}

// 팝업 닫기
function closePop(){
  document.getElementById("popup").style.display="none";
}

// 전체화면
function goFull(){
  if(document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen();
  }
}
</script>

</body>
</html>
