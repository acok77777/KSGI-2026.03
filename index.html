<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>나에게 주는 선물</title>

<style>
body{
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
}

/* 이미지 반응형 */
.container{
  width:100%;
  max-width:600px;
  position:relative;
}

.container img{
  width:100%;
  height:auto;
}

/* 팝업 */
.popup{
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup img{
  width:90%;
  max-width:500px;
  border-radius:20px;
}

/* 닫기 버튼 */
.close{
  position:absolute;
  top:20px;
  right:20px;
  font-size:35px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <img src="main.png" usemap="#map">

  <map name="map">
    <!-- 좌표 정확하게 수정됨 -->
    <area shape="rect" coords="0,150,300,350" onclick="openPop('health.png')">
    <area shape="rect" coords="300,150,600,350" onclick="openPop('love.png')">

    <area shape="rect" coords="0,350,300,550" onclick="openPop('cheer.png')">
    <area shape="rect" coords="300,350,600,550" onclick="openPop('rest.png')">

    <area shape="rect" coords="0,550,300,750" onclick="openPop('freedom.png')">
    <area shape="rect" coords="300,550,600,750" onclick="openPop('thanks.png')">

    <area shape="rect" coords="0,750,300,950" onclick="openPop('courage.png')">
    <area shape="rect" coords="300,750,600,950" onclick="openPop('hope.png')">
  </map>
</div>

<!-- 팝업 -->
<div class="popup" id="popup">
  <div class="close" onclick="closePop()">✖</div>
  <img id="popImg">
</div>

<script>
function openPop(img){
  document.getElementById("popup").style.display="flex";
  document.getElementById("popImg").src = img;
}

function closePop(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
