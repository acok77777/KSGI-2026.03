<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>나에게 주는 선물</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#fff;
  overflow:hidden;
}

/* 상단 */
.header{
  position:relative;
  text-align:center;
  padding:10px;
}

.header img{
  width:340px;
}

/* 전체화면 버튼 */
.full-btn{
  position:absolute;
  right:10px;
  top:10px;
  padding:8px 12px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* 🔥 화면 꽉 채우기 */
.grid{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(2, 1fr);
  height: calc(100vh - 120px);
  gap:6px;
  padding:6px;
}

/* 이미지 버튼 */
.item{
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.item img{
  width:100%;
  height:100%;
  object-fit:contain;
  transition:0.2s;
}

.item:active img{
  transform:scale(0.95);
}

/* 팝업 */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#fff;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup img{
  width:95%;
  max-height:95%;
}

/* 닫기 */
.close{
  position:absolute;
  top:15px;
  right:20px;
  font-size:35px;
  cursor:pointer;
}

/* 💖 하트 효과 */
.heart{
  position:absolute;
  width:120px;
  animation:pop 0.5s ease-out;
  pointer-events:none;
}

@keyframes pop{
  0%{transform:scale(0); opacity:1;}
  100%{transform:scale(2.5); opacity:0;}
}
</style>
</head>

<body>

<!-- 타이틀 -->
<div class="header">
  <img src="title.png">
  <button class="full-btn" id="fullBtn" onclick="goFull()">전체화면</button>
</div>

<!-- 이미지 -->
<div class="grid">

  <div class="item" onclick="openPopup(event,'health.png')"><img src="01.png"></div>
  <div class="item" onclick="openPopup(event,'love.png')"><img src="02.png"></div>
  <div class="item" onclick="openPopup(event,'cheer.png')"><img src="03.png"></div>
  <div class="item" onclick="openPopup(event,'rest.png')"><img src="04.png"></div>

  <div class="item" onclick="openPopup(event,'freedom.png')"><img src="05.png"></div>
  <div class="item" onclick="openPopup(event,'thanks.png')"><img src="06.png"></div>
  <div class="item" onclick="openPopup(event,'courage.png')"><img src="07.png"></div>
  <div class="item" onclick="openPopup(event,'hope.png')"><img src="08.png"></div>

</div>

<!-- 팝업 -->
<div class="popup" id="popup">
  <div class="close" onclick="closePopup()">✖</div>
  <img id="popupImg">
</div>

<script>
// 💖 하트 + 팝업
function openPopup(e, imgSrc){

  // 하트 여러개 퍼짐 효과
  for(let i=0;i<3;i++){
    let heart = document.createElement("img");
    heart.src = "heart.png";
    heart.className = "heart";

    heart.style.left = (e.clientX - 60 + (Math.random()*40-20)) + "px";
    heart.style.top = (e.clientY - 60 + (Math.random()*40-20)) + "px";

    document.body.appendChild(heart);
    setTimeout(()=> heart.remove(),500);
  }

  // 팝업
  setTimeout(()=>{
    document.getElementById("popupImg").src = imgSrc;
    document.getElementById("popup").style.display = "flex";
  },200);
}

// 닫기
function closePopup(){
  document.getElementById("popup").style.display = "none";
}

// 전체화면 + 버튼 숨김
function goFull(){
  let doc = document.documentElement;

  if(doc.requestFullscreen){
    doc.requestFullscreen();
  }

  document.getElementById("fullBtn").style.display = "none";

  if(screen.orientation && screen.orientation.lock){
    screen.orientation.lock('landscape').catch(()=>{});
  }
}
</script>

</body>
</html>
