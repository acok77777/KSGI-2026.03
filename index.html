<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>나에게 주는 선물</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#fff;
  overflow:hidden;
}

/* 전체화면 버튼 */
.full-btn{
  position:fixed;
  right:10px;
  top:10px;
  padding:8px 12px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  z-index:1000;
}

/* 전체 영역 */
.wrapper{
  padding:10px 32px; /* 👉 상하 + 좌우 여백 확보 */
  display:flex;
  flex-direction:column;
  height:100vh;
  box-sizing:border-box;
}

/* 타이틀 */
.title{
  text-align:center;
  margin-bottom:8px;
}

.title img{
  width:70%;
  max-height:45px; /* 👉 더 줄임 */
  object-fit:contain;
}

/* 그리드 */
.grid{
  flex:1;
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap:10px;
  height:78%; /* 👉 전체적으로 더 줄여서 위/아래 안 잘리게 */
}

/* 박스 */
.item{
  cursor:pointer;
  overflow:hidden;
  border-radius:12px;
}

/* 이미지 */
.item img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.2s;
}

.item:active img{
  transform:scale(0.95);
}

/* 팝업 */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#fff;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup img{
  width:95%;
  max-height:95%;
}

/* 닫기 */
.close{
  position:absolute;
  top:15px;
  right:20px;
  font-size:35px;
  cursor:pointer;
}

/* 하트 */
.heart{
  position:absolute;
  width:70px;
  animation:pop 0.5s ease-out;
  pointer-events:none;
}

@keyframes pop{
  0%{transform:scale(0); opacity:1;}
  100%{transform:scale(1.6); opacity:0;}
}
</style>
</head>

<body>

<button class="full-btn" id="fullBtn" onclick="goFull()">전체화면</button>

<div class="wrapper">

  <div class="title">
    <img src="title.png">
  </div>

  <div class="grid">

    <div class="item" onclick="openPopup(event,'health.png')"><img src="01.png"></div>
    <div class="item" onclick="openPopup(event,'love.png')"><img src="02.png"></div>
    <div class="item" onclick="openPopup(event,'cheer.png')"><img src="03.png"></div>
    <div class="item" onclick="openPopup(event,'rest.png')"><img src="04.png"></div>

    <div class="item" onclick="openPopup(event,'freedom.png')"><img src="05.png"></div>
    <div class="item" onclick="openPopup(event,'thanks.png')"><img src="06.png"></div>
    <div class="item" onclick="openPopup(event,'courage.png')"><img src="07.png"></div>
    <div class="item" onclick="openPopup(event,'hope.png')"><img src="08.png"></div>

  </div>
</div>

<div class="popup" id="popup">
  <div class="close" onclick="closePopup()">✖</div>
  <img id="popupImg">
</div>

<script>
function openPopup(e, imgSrc){

  for(let i=0;i<3;i++){
    let heart = document.createElement("img");
    heart.src = "heart.png";
    heart.className = "heart";

    heart.style.left = (e.clientX - 35 + (Math.random()*40-20)) + "px";
    heart.style.top = (e.clientY - 35 + (Math.random()*40-20)) + "px";

    document.body.appendChild(heart);
    setTimeout(()=> heart.remove(),500);
  }

  setTimeout(()=>{
    document.getElementById("popupImg").src = imgSrc;
    document.getElementById("popup").style.display = "flex";
  },150);
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

function goFull(){
  let doc = document.documentElement;

  if(doc.requestFullscreen){
    doc.requestFullscreen();
  }

  document.getElementById("fullBtn").style.display = "none";

  if(screen.orientation && screen.orientation.lock){
    screen.orientation.lock('landscape').catch(()=>{});
  }
}
</script>

</body>
</html>
